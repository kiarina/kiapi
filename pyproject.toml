[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
kiapi = { workspace = true }
kiapi-relay = { workspace = true }
kiapi-proxy = { workspace = true }

[tool.uv]
# The development lockfile resolves on Apple Silicon (kiapi pulls MLX wheels).
# This only constrains the local uv.lock; the cross-platform packages
# (kiapi-relay, kiapi-proxy) publish their own platform-agnostic metadata.
environments = ["sys_platform == 'darwin' and platform_machine == 'arm64'"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "mypy>=1.14.1",
    "ruff>=0.12.1",
    "types-PyYAML>=6.0.12.20250915",
    "httpx2>=2.4.0",
]
lint = [
    "mypy>=1.14.1",
    "ruff>=0.12.1",
    "types-PyYAML>=6.0.12.20250915",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
follow_imports = "silent"
incremental = true

[tool.ruff]
line-length = 88
target-version = "py312"
fix = true

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "RUF", # ruff-specific rules
]
ignore = [
    "E501", # line too long: let the formatter handle it (ignore long strings/comments)
    "B008", # function call in argument defaults: required for FastAPI Depends()
]

[tool.ruff.lint.isort]
known-first-party = ["kiapi", "kiapi_relay", "kiapi_proxy"]
