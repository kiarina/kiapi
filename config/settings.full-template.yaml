#--------------------------------------------------------------------------------
# Settings for API server binding, authentication, and sync request waits.
#--------------------------------------------------------------------------------
kiapi.api:
  # Bind host: str
  #   Hostname or IP address that the kiapi API server binds to.
  #   Use 127.0.0.1 for local-only access, or 0.0.0.0 in a trusted environment when other devices on the same network should connect.
  # host: 127.0.0.1
  #--------------------------------------------------
  # Bind port: int
  #   TCP port that the kiapi API server binds to.
  #   The usual value is 8000.
  # port: 8000
  #--------------------------------------------------
  # API auth token: SecretStr | None
  #   When set, API calls must use Bearer token authentication.
  #   When unset, requests are accepted without authentication.
  # auth_token: 
  #--------------------------------------------------
  # Sync request wait seconds: float
  #   Maximum number of seconds a sync-mode API call waits for job completion.
  #   If this is exceeded, kiapi returns a timeout error instead of switching the request to async mode.
  # sync_timeout_s: 600.0

#--------------------------------------------------------------------------------
# Settings for the global kiapi logging level.
#--------------------------------------------------------------------------------
kiapi.core.logging:
  # Log level: LogLevel
  #   Verbosity of emitted logs.
  #   Standard Python logging levels such as DEBUG, INFO, WARNING, ERROR, and CRITICAL are accepted.
  # log_level: INFO

#--------------------------------------------------------------------------------
# Application settings
#--------------------------------------------------------------------------------
kiarina.utils.app:
  # User cache directory: str | None
  #   Directory where the application may store user-specific cache files.
  #   When unset, XDG_CACHE_HOME is used when available, otherwise the platform default for the running user is used.
  #   ~ is expanded as the home directory of the running user.
  # user_cache_dir: 
  #--------------------------------------------------
  # User config directory: str | None
  #   Directory where the application may store user-specific configuration files.
  #   When unset, XDG_CONFIG_HOME is used when available, otherwise the platform default for the running user is used.
  #   ~ is expanded as the home directory of the running user.
  # user_config_dir: 
  #--------------------------------------------------
  # User data directory: str | None
  #   Directory where the application may store user-specific persistent data files.
  #   When unset, XDG_DATA_HOME is used when available, otherwise the platform default for the running user is used.
  #   ~ is expanded as the home directory of the running user.
  # user_data_dir: 

#--------------------------------------------------------------------------------
# Settings for per-request temporary work directories.
#--------------------------------------------------------------------------------
kiapi.core.workdir:
  # Temporary work directory root: str
  #   Root directory for temporary work files created while handling requests.
  #   Each operation creates a purpose-specific child directory under this root.
  # tmp_root: /tmp/kiapi/work

#--------------------------------------------------------------------------------
# Settings for the file store that keeps uploads and generated artifacts.
#--------------------------------------------------------------------------------
kiapi.core.file:
  # File storage directory: str
  #   Directory where uploaded files and generated artifacts are stored.
  #   The default is under /tmp so files may disappear after reboot or tmp cleanup.
  #   ~ is expanded as the home directory of the running user.
  # files_root: /tmp/kiapi/files

#--------------------------------------------------------------------------------
# Settings for the model residency memory budget and idle TTL shared by all capabilities.
#--------------------------------------------------------------------------------
kiapi.core.memory:
  # Memory budget GB: float | None
  #   Memory budget in GB shared by resident models and runtime peaks across all capabilities.
  #   If unset, kiapi uses 80% of the machine's total memory.
  #   Before a job starts, lower-priority and older resident models are released until the job fits within this value.
  # memory_limit_gb: 
  #--------------------------------------------------
  # Default idle TTL seconds: float
  #   Default number of seconds before an unused resident model is auto-released.
  #   Set to 0.0 or less to disable TTL release and evict only under memory pressure.
  # default_ttl_s: 1800.0

#--------------------------------------------------------------------------------
# Settings for the single worker queue, TTL sweeping, and startup warmup.
#--------------------------------------------------------------------------------
kiapi.core.worker:
  # TTL sweep interval seconds: float
  #   Interval for background checks of resident models that exceeded their idle TTL.
  #   Set to 0.0 to completely disable the background sweep.
  # ttl_sweep_interval_s: 60.0
  #--------------------------------------------------
  # Startup warmup models: list[ModelKey]
  #   List of model keys to preload when the server starts.
  #   Each item uses the model registry key format. An empty list keeps models lazily loaded.
  # warmup_models: []

#--------------------------------------------------------------------------------
# Network safety settings for accessing user-provided URLs.
#--------------------------------------------------------------------------------
kiapi.core.net:
  # Allow private URLs: bool
  #   When true, disables the SSRF guard and allows URLs that resolve to private, loopback, or link-local addresses.
  #   Enable this only in a trusted local development environment.
  # allow_private_urls: false

#--------------------------------------------------------------------------------
#--------------------------------------------------------------------------------
kiapi_relay:
  # Default relay: RelaySpecifier | None
  #   Relay specifier started with the API server.
  #   Leave unset to disable remote relay processing.
  # default: 
  #--------------------------------------------------
  # Relay presets: dict[RelayName, str]
  #   Built-in relay factories keyed by relay name.
  # presets:
  #   gcp: "kiapi_relay.impl.gcp:create_gcp_relay"
  #   local: "kiapi_relay.impl.local:create_local_relay"
  #--------------------------------------------------
  # Custom relays: dict[RelayName, str]
  #   Custom relay factories keyed by relay name.
  # customs: {}

#--------------------------------------------------------------------------------
#--------------------------------------------------------------------------------
kiapi_relay.impl.gcp:
  # Firebase Realtime Database URL: str
  #   Database root URL, for example https://project.firebaseio.com.
  database_url:
  #--------------------------------------------------
  # GCS bucket: str
  #   Bucket used for relay request and response payloads.
  bucket:
  #--------------------------------------------------
  # Object and RTDB prefix: str
  #   Shared prefix used below both RTDB and GCS roots.
  # prefix: kiapi
  #--------------------------------------------------
  # Google settings key: str | None
  #   Named kiarina.lib.google settings entry used for RTDB and GCS access.
  # google_settings_key: 
  #--------------------------------------------------
  # GCS lifecycle age days: int
  #   Delete relay session objects after this many days. The matching bucket lifecycle rule is installed at startup.
  # lifecycle_age_days: 1
  #--------------------------------------------------
  # Manage GCS lifecycle: bool
  #   Install the prefix-scoped delete lifecycle rule at startup.
  # manage_bucket_lifecycle: true
  #--------------------------------------------------
  # RTDB reconnect delay seconds: float
  #   Delay before reconnecting the RTDB SSE watch after an error.
  # reconnect_delay_s: 1.0
  #--------------------------------------------------
  # RTDB request poll interval seconds: float
  #   Delay between response polls when issuing relay requests.
  # request_poll_interval_s: 0.5
  #--------------------------------------------------
  # Liveness heartbeat interval seconds: float
  #   How often the kiapi node refreshes its liveness entry.
  # heartbeat_interval_s: 300.0
  #--------------------------------------------------
  # Liveness staleness threshold seconds: float
  #   A node is considered usable only when its last heartbeat is newer than this. Clients pick the most recently seen node within it.
  # liveness_ttl_s: 1800.0

#--------------------------------------------------------------------------------
#--------------------------------------------------------------------------------
kiapi_relay.impl.local:
  # Local relay root: Path
  #   Directory used for local relay request and response payloads.
  # root:
  #   /tmp/kiapi/relay
  #--------------------------------------------------
  # Local relay prefix: str
  #   Shared prefix used below the local relay root.
  # prefix: kiapi
  #--------------------------------------------------
  # Local relay poll interval seconds: float
  #   Delay between local request directory scans.
  # poll_interval_s: 0.2
  #--------------------------------------------------
  # Liveness heartbeat interval seconds: float
  #   How often the kiapi node refreshes its liveness entry.
  # heartbeat_interval_s: 300.0
  #--------------------------------------------------
  # Liveness staleness threshold seconds: float
  #   A node is considered usable only when its last heartbeat is newer than this. Clients pick the most recently seen node within it.
  # liveness_ttl_s: 1800.0

