#--------------------------------------------------------------------------------
# Settings for Chat Completions generation defaults and input-processing limits.
#--------------------------------------------------------------------------------
kiapi.capabilities.chat:
  # Default maximum generated tokens: int
  #   Generation token limit used when a request omits max_tokens.
  # default_max_tokens: 512
  #--------------------------------------------------
  # Default temperature: float
  #   Sampling temperature used when a request omits temperature.
  #   Lower values are more stable; higher values are more diverse.
  # default_temperature: 0.7
  #--------------------------------------------------
  # Default top_p: float
  #   Nucleus sampling threshold used when a request omits top_p.
  #   Use a value greater than 0 and less than or equal to 1.0.
  # default_top_p: 1.0
  #--------------------------------------------------
  # Default video input sampling FPS: float
  #   Default FPS for extracting frames from video input before passing them to the model.
  #   Higher values provide finer video understanding, but increase processing time and input size.
  # default_fps: 1.0
  #--------------------------------------------------
  # Use audio in video: bool
  #   When true, audio tracks in video files are demuxed and passed to the model as audio input.
  # use_audio_in_video: true
  #--------------------------------------------------
  # Maximum generated token cap: int
  #   Server-side upper limit for max_tokens accepted in a request.
  #   This protects the single worker queue from being blocked for a long time.
  # max_tokens_cap: 4096

#--------------------------------------------------------------------------------
# Settings for Embedding input length limits.
#--------------------------------------------------------------------------------
kiapi.capabilities.embedding:
  # Maximum input token length: int
  #   Maximum token length passed to the embedding model tokenizer.
  #   Inputs longer than this are truncated before model processing.
  # max_length: 512

#--------------------------------------------------------------------------------
# Settings for Depth Pro quantization, input image limits, and progress display.
#--------------------------------------------------------------------------------
kiapi.capabilities.depthpro:
  # Default quantization bits: int | None
  #   Default quantization bit count used when loading the Depth Pro model.
  #   Use a bit count such as 8, or None to disable quantization.
  # default_quantize: 8
  #--------------------------------------------------
  # Maximum input pixels: int
  #   Maximum total pixel count for an input image passed to Depth Pro.
  #   This protects the single worker queue from being blocked for a long time by very large images.
  # max_input_pixels: 16777216
  #--------------------------------------------------
  # Progress ETA seconds: float
  #   Expected processing seconds used to show synthetic progress while Depth Pro runs.
  #   Set to 0 to keep progress at the coarse value until completion.
  # progress_eta_s: 8.0

#--------------------------------------------------------------------------------
# Settings for ERNIE-Image model variants, generation/edit defaults, and LoRA training.
#--------------------------------------------------------------------------------
kiapi.capabilities.ernie:
  # Turbo model repo: str
  #   Hugging Face repo ID used as the ERNIE-Image turbo variant.
  # turbo_model: baidu/ERNIE-Image-Turbo
  #--------------------------------------------------
  # Base model repo: str
  #   Hugging Face repo ID used as the ERNIE-Image base variant.
  # base_model: baidu/ERNIE-Image
  #--------------------------------------------------
  # Default steps by variant: dict[str, int]
  #   Diffusion step count used when a generation or edit request omits steps.
  #   Keys are variant names such as turbo or base; values are step counts.
  # default_steps:
  #   turbo: 8
  #   base: 50
  #--------------------------------------------------
  # Default guidance by variant: dict[str, float]
  #   Guidance strength used when a generation or edit request omits guidance.
  #   Keys are variant names; values are guidance values.
  # default_guidance:
  #   turbo: 1.0
  #   base: 4.0
  #--------------------------------------------------
  # Default quantization bits by variant: dict[str, int | None]
  #   Default quantization bit count used when loading a model.
  #   Keys are variant names; values are bit counts such as 8, or None for no quantization.
  # default_quantize:
  #   turbo: 8
  #   base: 8
  #--------------------------------------------------
  # Default width: int
  #   Output image width in pixels used when a request omits width.
  # default_width: 1024
  #--------------------------------------------------
  # Default height: int
  #   Output image height in pixels used when a request omits height.
  # default_height: 1024
  #--------------------------------------------------
  # Maximum width: int
  #   Upper pixel limit for the output image width accepted in a request.
  # max_width: 2048
  #--------------------------------------------------
  # Maximum height: int
  #   Upper pixel limit for the output image height accepted in a request.
  # max_height: 2048
  #--------------------------------------------------
  # Maximum inference steps: int
  #   Upper limit for the diffusion step count accepted in a request.
  # max_steps: 100
  #--------------------------------------------------
  # Maximum LoRA count: int
  #   Maximum number of LoRA adapters that can be applied in one generation or edit request.
  # max_loras: 4
  #--------------------------------------------------
  # Require square edit input: bool
  #   When true, ERNIE image-to-image/edit avoids non-square sizes.
  #   This conservative default works around mflux VAE latent-packing constraints.
  # edit_require_square: true
  #--------------------------------------------------
  # LoRA training reserved memory GB: float
  #   Memory in GB reserved for the runtime peak of an ERNIE-Image LoRA training job.
  # train_reserve_gb: 24.0
  #--------------------------------------------------
  # Training steps by variant: dict[str, int]
  #   Step count used when a LoRA training request omits steps.
  #   Keys are variant names; values are training step counts.
  # train_steps:
  #   turbo: 8
  #   base: 50
  #--------------------------------------------------
  # Training timestep lower bound by variant: dict[str, int]
  #   Lower bound of the timestep range used during LoRA training.
  #   Keys are variant names; values are lower-bound timestep values.
  # train_timestep_low:
  #   turbo: 1
  #   base: 1
  #--------------------------------------------------
  # Training quantization bits by variant: dict[str, int | None]
  #   Quantization bit count applied to the model during LoRA training.
  #   Keys are variant names; values are bit counts such as 8, or None for no quantization.
  # train_quantize:
  #   turbo: 8
  #   base: 8

#--------------------------------------------------------------------------------
# Settings for FLUX.2 model variants, generation defaults, and LoRA training.
#--------------------------------------------------------------------------------
kiapi.capabilities.flux2:
  # Klein 9B model name: str
  #   Name registered in the model registry for the FLUX.2 Klein 9B variant.
  # klein_9b_model: flux2-klein-9b
  #--------------------------------------------------
  # Klein Base 4B model name: str
  #   Name registered in the model registry for the FLUX.2 Klein Base 4B variant.
  # klein_base_4b_model: flux2-klein-base-4b
  #--------------------------------------------------
  # Klein Base 9B model name: str
  #   Name registered in the model registry for the FLUX.2 Klein Base 9B variant.
  # klein_base_9b_model: flux2-klein-base-9b
  #--------------------------------------------------
  # Default steps by variant: dict[str, int]
  #   Diffusion step count used when a generation or edit request omits steps.
  #   Keys are variant names such as klein-9b; values are step counts.
  # default_steps:
  #   klein-9b: 4
  #   klein-base-4b: 40
  #   klein-base-9b: 40
  #--------------------------------------------------
  # Default guidance by variant: dict[str, float]
  #   Guidance strength used when a generation or edit request omits guidance.
  #   Keys are variant names; values are guidance values.
  # default_guidance:
  #   klein-9b: 1.0
  #   klein-base-4b: 1.0
  #   klein-base-9b: 1.0
  #--------------------------------------------------
  # Default quantization bits by variant: dict[str, int | None]
  #   Default quantization bit count used when loading a model.
  #   Keys are variant names; values are bit counts such as 8, or None for no quantization.
  # default_quantize:
  #   klein-9b: 
  #   klein-base-4b: 8
  #   klein-base-9b: 8
  #--------------------------------------------------
  # Default width: int
  #   Output image width in pixels used when a request omits width.
  # default_width: 1024
  #--------------------------------------------------
  # Default height: int
  #   Output image height in pixels used when a request omits height.
  # default_height: 1024
  #--------------------------------------------------
  # Maximum width: int
  #   Upper pixel limit for the output image width accepted in a request.
  # max_width: 2048
  #--------------------------------------------------
  # Maximum height: int
  #   Upper pixel limit for the output image height accepted in a request.
  # max_height: 2048
  #--------------------------------------------------
  # Maximum inference steps: int
  #   Upper limit for the diffusion step count accepted in a request.
  # max_steps: 100
  #--------------------------------------------------
  # Maximum LoRA count: int
  #   Maximum number of LoRA adapters that can be applied in one generation or edit request.
  # max_loras: 4
  #--------------------------------------------------
  # Default LoRA training model: str
  #   FLUX.2 variant name used when a LoRA training request omits model.
  #   Usually this should be a training-capable variant such as klein-base-4b or klein-base-9b.
  # train_default_model: klein-base-4b
  #--------------------------------------------------
  # LoRA training reserved memory GB: float
  #   Memory in GB reserved for the runtime peak of a FLUX.2 LoRA training job.
  # train_reserve_gb: 24.0
  #--------------------------------------------------
  # Training steps by variant: dict[str, int]
  #   Step count used when a LoRA training request omits steps.
  #   Keys are variant names; values are training step counts.
  # train_steps:
  #   klein-base-4b: 40
  #   klein-base-9b: 40
  #--------------------------------------------------
  # Training timestep lower bound by variant: dict[str, int]
  #   Lower bound of the timestep range used during LoRA training.
  #   Keys are variant names; values are lower-bound timestep values.
  # train_timestep_low:
  #   klein-base-4b: 25
  #   klein-base-9b: 25
  #--------------------------------------------------
  # Training quantization bits by variant: dict[str, int | None]
  #   Quantization bit count applied to the model during LoRA training.
  #   Keys are variant names; values are bit counts such as 8, or None for no quantization.
  # train_quantize:
  #   klein-base-4b: 8
  #   klein-base-9b: 8

