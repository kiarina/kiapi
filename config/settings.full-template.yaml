  # max_width: 2048
  #--------------------------------------------------
  # Maximum height: int
  #   Upper pixel limit for the output image height accepted in a request.
  # max_height: 2048
  #--------------------------------------------------
  # Maximum inference steps: int
  #   Upper limit for the diffusion step count accepted in a request.
  # max_steps: 100
  #--------------------------------------------------
  # Maximum LoRA count: int
  #   Maximum number of LoRA adapters that can be applied in one generation request.
  # max_loras: 4
  #--------------------------------------------------
  # LoRA training reserved memory GB: float
  #   Memory in GB reserved for the runtime peak of a Z-Image LoRA training job.
  # train_reserve_gb: 24.0
  #--------------------------------------------------
  # Training steps by variant: dict[str, int]
  #   Step count used when a LoRA training request omits steps.
  #   Keys are variant names; values are training step counts.
  # train_steps:
  #   turbo: 9
  #   base: 20
  #--------------------------------------------------
  # Training timestep lower bound by variant: dict[str, int]
  #   Lower bound of the timestep range used during LoRA training.
  #   Keys are variant names; values are lower-bound timestep values.
  # train_timestep_low:
  #   turbo: 4
  #   base: 0
  #--------------------------------------------------
  # Training quantization bits by variant: dict[str, int | None]
  #   Quantization bit count applied to the model during LoRA training.
  #   Keys are variant names; values are bit counts such as 8, or None for no quantization.
  # train_quantize:
  #   turbo: 8
  #   base: 8
  #--------------------------------------------------
  # Default LoRA training epochs: int
  #   Epoch count used when a LoRA training request omits epochs.
  # train_default_epochs: 10
  #--------------------------------------------------
  # Default LoRA training rank: int
  #   LoRA rank used when a LoRA training request omits rank.
  #   Higher values increase expressiveness and memory usage.
  # train_default_rank: 16
  #--------------------------------------------------
  # Default LoRA training learning rate: float
  #   Learning rate used when a LoRA training request omits lr.
  # train_default_lr: 0.0001
  #--------------------------------------------------
  # Maximum LoRA training epochs: int
  #   Upper limit for epochs accepted in a LoRA training request.
  # train_max_epochs: 1000

#--------------------------------------------------------------------------------
# Settings for the ACE-Step isolated venv subprocess, checkpoints, and generation duration.
#--------------------------------------------------------------------------------
kiapi.capabilities.acestep:
  # ACE-Step Python executable: str | None
  #   Python path for the dedicated venv where ACE-Step dependencies are installed.
  #   When unset, kiapi uses the ACE-Step venv under the user data directory.
  # python_path: 
  #--------------------------------------------------
  # ACE-Step working directory: str | None
  #   Directory where ACE-Step writes support files such as .cache/acestep.
  #   When unset, kiapi uses an ACE-Step project directory under the user data directory.
  # project_root: 
  #--------------------------------------------------
  # ACE-Step checkpoint directory: str | None
  #   Directory containing checkpoint subdirectories such as acestep-5Hz-lm-1.7B and acestep-v15-*.
  #   When unset, kiapi uses the ACE-Step checkpoint directory under the user data directory.
  # checkpoint_dir: 
  #--------------------------------------------------
  # Shared LLM checkpoint name: str
  #   Subdirectory name under checkpoint_dir for the ACE-Step language model checkpoint.
  # llm_model: acestep-5Hz-lm-1.7B
  #--------------------------------------------------
  # Subprocess ready timeout seconds: float
  #   Maximum seconds to wait for the ACE-Step subprocess to load models and become ready.
  # ready_timeout_s: 600.0
  #--------------------------------------------------
  # Generation job timeout seconds: float
  #   Maximum runtime seconds allowed for one ACE-Step generation job.
  # job_timeout_s: 1200.0
  #--------------------------------------------------
  # Maximum generation seconds: int
  #   Upper limit for music generation duration in seconds accepted in a request.
  #   Longer values occupy the worker and keep memory resident for longer.
  # max_duration: 300

#--------------------------------------------------------------------------------
# Settings for AudioGen sound-effect duration defaults and limits.
#--------------------------------------------------------------------------------
kiapi.capabilities.audiogen:
  # Maximum generation seconds: float
  #   Maximum sound-effect duration in seconds accepted in a request.
  #   AudioGen medium is naturally limited to about 10 seconds, and this also protects the worker.
  # max_duration: 10.0
  #--------------------------------------------------
  # Default generation seconds: float
  #   Sound-effect duration in seconds used when a request omits duration.
  # default_duration: 5.0

#--------------------------------------------------------------------------------
# Settings for LTX-2 models, video dimensions, frame counts, and progress display.
#--------------------------------------------------------------------------------
kiapi.capabilities.ltx2:
  # LTX-2 model repo: str
  #   Hugging Face repo ID for the LTX-2 model used for video generation.
  # model_repo: prince-canuma/LTX-2-distilled
  #--------------------------------------------------
  # Text encoder repo: str | None
  #   Hugging Face repo ID for a text encoder from a separate repo.
  #   When None, the model's default text encoder is used.
  # text_encoder_repo: 
  #--------------------------------------------------
  # Maximum frame count: int
  #   Upper limit for the video frame count accepted in a request.
  # max_num_frames: 721
  #--------------------------------------------------
  # Maximum width: int
  #   Upper pixel limit for the video width accepted in a request.
  # max_width: 768
  #--------------------------------------------------
  # Maximum height: int
  #   Upper pixel limit for the video height accepted in a request.
  # max_height: 768
  #--------------------------------------------------
  # Default width: int
  #   Video width in pixels used when a request omits width.
  # default_width: 512
  #--------------------------------------------------
  # Default height: int
  #   Video height in pixels used when a request omits height.
  # default_height: 512
  #--------------------------------------------------
  # Default frame count: int
  #   Generated frame count used when a request omits num_frames.
  # default_num_frames: 97
  #--------------------------------------------------
  # Default FPS: int
  #   Output video FPS used when a request omits fps.
  # default_fps: 24
  #--------------------------------------------------
  # Progress ETA base seconds: float
  #   Expected seconds for synthetic progress, based on a 97-frame 512x512 LTX-2 job.
  #   The value is scaled by frame count and resolution. Set to 0 to disable it.
  # progress_eta_base_s: 90.0

#--------------------------------------------------------------------------------
# Settings for Web search/fetch backends and request defaults.
#--------------------------------------------------------------------------------
kiapi.capabilities.web:
  # Search backend Docker image: str
  #   SearXNG Docker image name launched as the Web search backend.
  # search_image: "searxng/searxng:latest"
  #--------------------------------------------------
  # Fetch backend Docker image: str
  #   Crawl4AI Docker image name launched as the Web page fetch backend.
  # fetch_image: "unclecode/crawl4ai:latest"
  #--------------------------------------------------
  # Backend ready timeout seconds: float
  #   Maximum seconds to wait for the search/fetch backend subprocess to become ready.
  # backend_ready_timeout_s: 60.0
  #--------------------------------------------------
  # Backend log directory: str
  #   Directory where search/fetch backend subprocess logs are written.
  # backend_log_dir: /tmp/kiapi/logs/web
  #--------------------------------------------------
  # Search timeout seconds: float
  #   Maximum seconds allowed for one search request to SearXNG.
  # timeout_s: 10.0
  #--------------------------------------------------
  # Default search categories: list[str] | None
  #   Categories passed to SearXNG when a request omits categories.
  #   When None, SearXNG decides from its own defaults.
  # default_categories: 
  #--------------------------------------------------
  # Default search engines: list[str] | None
  #   SearXNG engine names used when a request omits engines.
  #   When None, SearXNG decides from its own defaults.
  # default_engines: 
  #--------------------------------------------------
  # Default search language: str | None
  #   Language code passed to SearXNG when a request omits language.
  #   When None, SearXNG decides from its own defaults.
  # default_language: 
  #--------------------------------------------------
  # Default SafeSearch level: int | None
  #   SearXNG SafeSearch value used when a request omits safesearch.
  #   Typically 0 disables it, 1 is moderate, and 2 is stricter. None uses the SearXNG default.
  # default_safesearch: 
  #--------------------------------------------------
  # Default maximum search results: int | None
  #   Maximum number of results returned when a request omits max_results.
  #   Set to None to disable client-side truncation in kiapi.
  # default_max_results: 10
  #--------------------------------------------------
  # Page fetch timeout seconds: float
  #   Maximum seconds allowed for one page fetch request to Crawl4AI.
  # fetch_timeout_s: 30.0
  #--------------------------------------------------
  # Minimum fetched content characters: int
  #   Minimum stripped Markdown length before fetched content is treated as empty.
  #   With 1, only truly empty renders fail. Higher values also reject near-empty pages.
  # fetch_min_content_chars: 1
  #--------------------------------------------------
  # Fetch Markdown filter: str
  #   Body extraction mode for Crawl4AI /md.
  #   fit returns readability-pruned Markdown; raw returns Markdown closer to the full DOM.
  # fetch_filter: fit
  #--------------------------------------------------
  # Fetch cache-bust value: str
  #   Cache control value passed to Crawl4AI /md.
  #   0 lets the server cache normally. Changing the value can act as a cache-busting identifier.
  # fetch_cache: 0
