name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-15
    env:
      MISE_GITHUB_ATTESTATIONS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.5.0
          cache: true
          install: false

      - name: Run CI pipeline
        run: mise run ci
