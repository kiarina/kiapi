name: Release PyPI

on:
  push:
    tags:
      # Per-package tags: <package>-v<version>, e.g. kiapi-v0.2.1, kiapi-relay-v0.1.0
      - "kiapi-v*.*.*"
      - "kiapi-relay-v*.*.*"
      - "kiapi-proxy-v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: macos-15
    env:
      MISE_GITHUB_ATTESTATIONS: "false"
    outputs:
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Parse package and version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PACKAGE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "Tag:     $TAG"
          echo "Package: $PACKAGE"
          echo "Version: $VERSION"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.5.0
          cache: true
          install: false

      - name: Setup tools via mise
        run: mise install

      - name: Install dependencies
        run: mise exec -- uv sync --all-extras --all-groups

      - name: Run release checks
        run: mise run ci

      - name: Build the tagged package
        run: mise run build "${{ steps.parse.outputs.package }}"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          PACKAGE="${{ steps.parse.outputs.package }}"
          VERSION="${{ steps.parse.outputs.version }}"

          if mise run changelog:extract "$PACKAGE" "$VERSION" --output /tmp/release_notes.md; then
            echo "use_auto_notes=false" >> "$GITHUB_OUTPUT"
            cat /tmp/release_notes.md
          else
            echo "use_auto_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: ${{ steps.changelog.outputs.use_auto_notes == 'false' && '/tmp/release_notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.use_auto_notes == 'true' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.build.outputs.package }}/

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
